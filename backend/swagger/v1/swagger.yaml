# =============================================================================
# New SUSHI API — AUTHORITATIVE OpenAPI contract
# =============================================================================
# Status: AUTHORITATIVE. Hand-authored, reviewed. Single source of truth for the
#         Rails v8 API AND the FastAPI server. Do NOT generate this file.
#         (`rake rswag:specs:swaggerize` writes the disposable, git-ignored
#          swagger/v1/_generated_from_specs.yaml — never this file.)
#
# Conventions:
#   - OpenAPI 3.0.3; servers[0].url = /api/v1; paths are relative to that base
#     (no "/api/v1" embedded in path keys). Field names are snake_case.
#
# Maturity (single-encoded via x-maturity; tags are clean names only):
#   - x-maturity = ratified | draft, per operation.
#   - "ratified" means contract frozen AND implemented. In B1 (spec consolidation,
#     no endpoint implementation) EVERY operation is `draft`. Each endpoint is
#     promoted to `ratified` only in the step that implements it and passes the
#     contract tests (auth = B2, datasets = B3).
#   - Filter rule: the shared contract tests / CI gate enforce ONLY
#     `x-maturity: ratified`. `draft` is published/documented but not gated.
#     Enforcement is the repo-root Python runner's job; this file only carries the
#     metadata (validated by backend/spec/contract/contract_spec.rb).
#   See backend/swagger/v1/README.md.
# =============================================================================
openapi: 3.0.3
info:
  title: New SUSHI API
  version: 0.1.0
  description: |
    Secure common access point for SUSHI dataset registration and reading, plus
    project and job endpoints carried over from the current Rails app. Replaces
    ad-hoc direct DB access and plaintext-password scripts/Skills.

servers:
  - url: /api/v1
    description: Versioned API base path

tags:
  - name: Auth
    description: Authentication gateway (P0). All operations currently x-maturity=draft.
  - name: Datasets
    description: Dataset registration and reading (P1). All operations currently x-maturity=draft.
  - name: Projects
    description: Project listing (carried over from the current Rails app). x-maturity=draft.
  - name: Jobs
    description: Job submission/management (P2, carried over). x-maturity=draft.

# Applied as the default; endpoints override with `security: []` where public.
security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Short-lived access token issued by POST /auth/login.
    refreshCookie:
      type: apiKey
      in: cookie
      name: refresh_token
      description: HttpOnly, Secure, SameSite=Strict refresh token cookie.
    patAuth:
      type: http
      scheme: bearer
      description: |
        PROPOSED (not yet ratified). Personal Access Token, e.g.
        "Authorization: Bearer sushi_pat_xxxx". Long-lived, user-issued, scoped,
        revocable. Same header as bearerAuth; the server distinguishes a PAT by its
        "sushi_pat_" prefix (DB lookup) from a short-lived JWT.

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Machine-stable error code, e.g. "not_found", "forbidden".
        message:
          type: string
          description: Human-readable detail (may be localized).
      example: { error: "not_found", message: "Dataset 9999 does not exist" }

    LoginOptions:
      type: object
      required: [ldap_auth, authentication_skipped]
      properties:
        ldap_auth:
          type: boolean
          description: Whether LDAP authentication is active.
        authentication_skipped:
          type: boolean
          description: When true, auth is bypassed (dev/local only).

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string, example: "masaomi" }
        password: { type: string, format: password }

    User:
      type: object
      required: [user_id, login, projects]
      properties:
        user_id: { type: integer, example: 42 }
        login: { type: string, example: "masaomi" }
        projects:
          type: array
          items: { type: integer }
          description: Project numbers the user may access.
          example: [1001, 1535]

    TokenResponse:
      type: object
      required: [access_token, token_type, user]
      properties:
        access_token: { type: string, description: JWT access token (body). }
        token_type: { type: string, enum: [bearer], example: bearer }
        user: { $ref: '#/components/schemas/User' }
      # Refresh token is NOT in the body; it is set as an HttpOnly cookie.

    # --- PROPOSED (not yet ratified): Personal Access Tokens -----------------
    ApiToken:
      type: object
      description: Metadata for an issued PAT (the secret itself is never returned after creation).
      required: [id, name, scopes, created_at]
      properties:
        id: { type: integer }
        name: { type: string, example: "devday-register-bot" }
        scopes:
          type: array
          items: { type: string, enum: [read, register] }
          example: [read, register]
        project_numbers:
          type: array
          items: { type: integer }
          nullable: true
          description: If set, the token is restricted to these projects.
          example: [1001]
        expires_at: { type: string, format: date-time, nullable: true }
        last_used_at: { type: string, format: date-time, nullable: true }
        revoked: { type: boolean }
        created_at: { type: string, format: date-time }

    CreateTokenRequest:
      type: object
      required: [name, scopes]
      properties:
        name: { type: string, example: "devday-register-bot" }
        scopes:
          type: array
          items: { type: string, enum: [read, register] }
        project_numbers:
          type: array
          items: { type: integer }
          nullable: true
        expires_in_days:
          type: integer
          default: 90
          description: Days until expiry; subject to a server-side maximum.

    CreateTokenResponse:
      allOf:
        - $ref: '#/components/schemas/ApiToken'
        - type: object
          required: [token]
          properties:
            token:
              type: string
              description: |
                The plaintext PAT. Shown ONCE at creation; never retrievable again.
                Prefixed with "sushi_pat_".
              example: "sushi_pat_3f9a...c0"

    Sample:
      type: object
      description: |
        One row of a dataset. `key_value` mirrors the legacy SUSHI samples.key_value
        semantics. IMPORTANT: insertion order of keys is significant — the SUSHI UI
        renders columns in reverse JSON-insertion order, so "Name" must be the FIRST
        key to appear as the leftmost column.
      additionalProperties: true
      example:
        Name: "sampleA"
        "Read1 [File]": "p1001/.../sampleA_R1.fastq.gz"
        "Species": "Homo sapiens"

    DataSet:
      type: object
      required: [id, name, project_number, num_samples]
      properties:
        id: { type: integer, example: 9 }
        name: { type: string, example: "FastQC_result" }
        comment: { type: string, nullable: true }
        project_number:
          type: integer
          description: B-Fabric / SUSHI project number.
          example: 1001
        parent_id:
          type: integer
          nullable: true
          description: Parent dataset id (SUSHI tree linkage). null at root.
        bfabric_id: { type: integer, nullable: true }
        workunit_id: { type: integer, nullable: true }
        sushi_app_name:
          type: string
          nullable: true
          description: App that produced this dataset; null if imported.
        num_samples: { type: integer, example: 12 }
        completed_samples: { type: integer, example: 12 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    DataSetDetail:
      allOf:
        - $ref: '#/components/schemas/DataSet'
        - type: object
          properties:
            samples:
              type: array
              items: { $ref: '#/components/schemas/Sample' }
            columns:
              type: array
              description: Ordered column definitions (insertion order preserved).
              items:
                type: object
                properties:
                  name: { type: string }
                  tag: { type: string, nullable: true, example: "[File]" }

    DataSetList:
      type: object
      required: [datasets, total_count]
      properties:
        datasets:
          type: array
          items: { $ref: '#/components/schemas/DataSet' }
        total_count: { type: integer }
        pagination: { $ref: '#/components/schemas/Pagination' }

    RegisterDatasetRequest:
      type: object
      required: [project_number, name, samples]
      properties:
        project_number: { type: integer, example: 1001 }
        name: { type: string, example: "Custom_analysis_2026" }
        comment: { type: string, nullable: true }
        parent_dataset_id:
          type: integer
          nullable: true
          description: |
            SUSHI tree parent linkage. Supported from day one (do not defer). If
            `register_bfabric` is true this also maps to the B-Fabric parent.
        register_bfabric:
          type: boolean
          default: true
          description: Also create the B-Fabric workunit + resources.
        also_register_sushi:
          type: boolean
          default: true
          description: Insert into SUSHI data_sets + samples.
        samples:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/Sample' }
          description: |
            Sample rows. Key insertion order is significant (Name first). The server
            serializes these to the legacy samples.key_value format.

    # --- Projects (carried over from current Rails app) ----------------------
    Project:
      type: object
      required: [number]
      properties:
        number: { type: integer, example: 1001 }

    ProjectList:
      type: object
      required: [projects]
      properties:
        projects:
          type: array
          items: { $ref: '#/components/schemas/Project' }
        current_user: { type: string, example: "masaomi" }

    # --- Jobs (carried over from current Rails app, P2) ----------------------
    Pagination:
      type: object
      properties:
        page: { type: integer, example: 1 }
        per: { type: integer, example: 20 }

    JobSubmissionRequest:
      type: object
      required: [job]
      properties:
        job:
          type: object
          required: [dataset_id, app_name]
          properties:
            dataset_id: { type: integer, description: ID of the input dataset, example: 9 }
            app_name: { type: string, description: Name of the SushiApp to run, example: "FastqcApp" }
            parameters:
              type: object
              description: Application-specific parameters
              example: { cores: 8, ram: 15, scratch: 100 }
            next_dataset_name: { type: string, example: "FastQC_result" }
            next_dataset_comment: { type: string, example: "FastQC analysis results" }

    JobCreatedResponse:
      # TODO(B2): the current Rails implementation actually returns
      #   { job: {...}, output_dataset: {...} }. Reconcile contract vs impl in B2.
      type: object
      properties:
        id: { type: integer }
        status: { type: string }
        script_path: { type: string }
        output_dataset_id: { type: integer }

    JobDetail:
      type: object
      properties:
        id: { type: integer }
        status: { type: string }
        script_path: { type: string }
        input_dataset_id: { type: integer }
        output_dataset_id: { type: integer }
        job_parameters: { type: object }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    JobSummary:
      type: object
      additionalProperties: true
      description: A job row in a list (shape carried over loosely; tighten in B2).

    JobList:
      type: object
      required: [jobs]
      properties:
        jobs:
          type: array
          items: { $ref: '#/components/schemas/JobSummary' }
        pagination: { $ref: '#/components/schemas/Pagination' }

paths:
  # ===================== P0: Authentication gateway ==========================
  /auth/login_options:
    get:
      tags: [Auth]
      operationId: authLoginOptions
      summary: Available authentication methods
      x-maturity: draft
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginOptions' }

  /auth/login:
    post:
      tags: [Auth]
      operationId: authLogin
      summary: Authenticate (LDAP) and issue tokens
      x-maturity: draft
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: |
            Access token in body; refresh token set as HttpOnly cookie
            (Set-Cookie: refresh_token=...; HttpOnly; Secure; SameSite=Strict).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/refresh:
    post:
      tags: [Auth]
      operationId: authRefresh
      summary: Refresh the access token using the refresh cookie
      x-maturity: draft
      security: [{ refreshCookie: [] }]
      responses:
        '200':
          description: New access token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }
        '401':
          description: Missing/invalid/expired refresh token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/logout:
    post:
      tags: [Auth]
      operationId: authLogout
      summary: Revoke the current refresh token and clear the cookie
      x-maturity: draft
      security: [{ refreshCookie: [] }]
      responses:
        '200': { description: Logged out }

  /auth/logout-all:
    post:
      tags: [Auth]
      operationId: authLogoutAll
      summary: Revoke all refresh tokens for the current user
      x-maturity: draft
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Logged out from all sessions }

  /auth/me:
    get:
      tags: [Auth]
      operationId: authMe
      summary: Current authenticated user
      x-maturity: draft
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ----- PROPOSED (not yet ratified): Personal Access Token management -------
  /auth/tokens:
    get:
      tags: [Auth]
      operationId: listApiTokens
      summary: List the current user's PATs (metadata only)
      x-maturity: draft
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ApiToken' }
    post:
      tags: [Auth]
      operationId: createApiToken
      summary: Issue a new PAT (plaintext returned once)
      x-maturity: draft
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateTokenRequest' }
      responses:
        '201':
          description: Created; plaintext token returned once.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CreateTokenResponse' }
        '422':
          description: Validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/tokens/{id}:
    delete:
      tags: [Auth]
      operationId: revokeApiToken
      summary: Revoke a PAT
      x-maturity: draft
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        '204': { description: Revoked }
        '404':
          description: Not Found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ===================== P1: Register + read-only datasets ===================
  /datasets:
    get:
      tags: [Datasets]
      operationId: listDatasets
      summary: List datasets accessible to the current user
      x-maturity: draft
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: project_number, schema: { type: integer } }
        - { in: query, name: page, schema: { type: integer, default: 1 } }
        - { in: query, name: per, schema: { type: integer, default: 20 } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DataSetList' }
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    post:
      tags: [Datasets]
      operationId: registerDataset
      summary: Register a new dataset (B-Fabric workunit + SUSHI data_sets/samples)
      description: |
        The secure replacement for direct-DB / sushi_fabric SSH registration.
        Preserves legacy samples.key_value Ruby serialization and column order.
      x-maturity: draft
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterDatasetRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DataSet' }
        '403':
          description: No access to the target project
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422':
          description: Validation error (missing fields, bad samples)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /datasets/{id}:
    get:
      tags: [Datasets]
      operationId: getDataset
      summary: Dataset detail (with samples and columns)
      x-maturity: draft
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DataSetDetail' }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Not Found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ===================== Projects (carried over) =============================
  /projects:
    get:
      tags: [Projects]
      operationId: listProjects
      summary: List accessible projects
      x-maturity: draft
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectList' }

  /projects/{project_number}/datasets:
    get:
      tags: [Projects]
      operationId: listProjectDatasets
      summary: List datasets in a project
      x-maturity: draft
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: project_number, required: true, schema: { type: integer } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DataSetList' }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ===================== Jobs (carried over, P2) =============================
  /jobs:
    post:
      tags: [Jobs]
      operationId: submitJob
      summary: Submit a new job
      x-maturity: draft
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/JobSubmissionRequest' }
      responses:
        '201':
          description: Job created successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/JobCreatedResponse' }
        '400':
          description: Bad Request
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Dataset or App not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    get:
      tags: [Jobs]
      operationId: listJobs
      summary: List jobs
      x-maturity: draft
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: page, schema: { type: integer, default: 1 }, description: Page number }
        - { in: query, name: per, schema: { type: integer, default: 20 }, description: Items per page }
        - { in: query, name: status, schema: { type: string }, description: Filter by job status }
        - { in: query, name: dataset_id, schema: { type: integer }, description: Filter by input dataset ID }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/JobList' }

  /jobs/{id}:
    get:
      tags: [Jobs]
      operationId: getJob
      summary: Show job detail
      x-maturity: draft
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: integer } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/JobDetail' }
        '404':
          description: Not Found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
